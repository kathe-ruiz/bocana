<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bocana Joyas — Generador de Facturas</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --gold: #c8a96e;
    --gold-light: #e8d5a8;
    --gold-dark: #9a7b3f;
    --bg: #0d0d0d;
    --card: #1a1a1a;
    --card-hover: #222;
    --text: #f0ece4;
    --text-muted: #8a8577;
    --border: #2a2a2a;
    --danger: #c44;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lexend', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 80px;
  }
  .container { max-width: 640px; margin: 0 auto; }
  h1 {
    font-size: 1.6rem;
    font-weight: 600;
    text-align: center;
    margin-bottom: 4px;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
  }
  .subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-bottom: 32px;
  }
  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gold);
    margin-bottom: 16px;
  }
  .form-row { display: flex; gap: 12px; margin-bottom: 12px; }
  .form-row > * { flex: 1; }
  .form-group { margin-bottom: 12px; }
  label {
    display: block;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 500;
  }
  input, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Lexend', sans-serif;
    font-size: 0.9rem;
    transition: border-color 0.2s;
    outline: none;
  }
  input:focus, select:focus { border-color: var(--gold); }
  input::placeholder { color: #555; }
  .product-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 10px;
    position: relative;
  }
  .product-item .form-row { margin-bottom: 8px; }
  .product-item .form-row:last-child { margin-bottom: 0; }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Lexend', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.2s;
  }
  .btn-add {
    background: transparent;
    border: 1px dashed var(--gold-dark);
    color: var(--gold);
    width: 100%;
    padding: 12px;
  }
  .btn-add:hover { background: rgba(200,169,110,0.08); border-style: solid; }
  .btn-remove {
    position: absolute;
    top: 8px;
    right: 8px;
    background: transparent;
    border: none;
    color: var(--danger);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 4px 8px;
    border-radius: 4px;
    line-height: 1;
  }
  .btn-remove:hover { background: rgba(204,68,68,0.15); }
  .btn-generate {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: #111;
    width: 100%;
    padding: 14px 24px;
    font-size: 1rem;
    font-weight: 600;
    border-radius: var(--radius);
    margin-top: 8px;
  }
  .btn-generate:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(200,169,110,0.3); }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .totals {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 6px 16px;
    font-size: 0.9rem;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .totals .label { color: var(--text-muted); }
  .totals .value { text-align: right; font-weight: 500; }
  .totals .total-final .label { color: var(--gold); font-weight: 600; font-size: 1rem; }
  .totals .total-final .value { color: var(--gold); font-weight: 700; font-size: 1rem; }
  #qr-preview {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 80px;
    margin-top: 12px;
  }
  #qr-preview canvas, #qr-preview img { border-radius: 8px; }
  .qr-note { font-size: 0.7rem; color: var(--text-muted); text-align: center; margin-top: 6px; }
  .status-msg {
    text-align: center;
    padding: 12px;
    border-radius: 8px;
    font-size: 0.85rem;
    margin-top: 12px;
    display: none;
  }
  .status-msg.error { display: block; background: rgba(204,68,68,0.15); color: #e88; }
  .status-msg.success { display: block; background: rgba(110,200,110,0.15); color: #8c8; }
  .product-subtotal {
    text-align: right;
    font-size: 0.8rem;
    color: var(--gold);
    margin-top: 4px;
  }
  @media (max-width: 480px) {
    .form-row { flex-direction: column; gap: 8px; }
    .product-item .form-row { flex-direction: row; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>✦ Bocana Joyas</h1>
  <p class="subtitle">Generador de Factura Digital</p>

  <!-- Datos de la factura -->
  <div class="section">
    <div class="section-title">Datos de la Factura</div>
    <div class="form-row">
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="fecha" />
      </div>
      <div class="form-group">
        <label>No. Pedido Shopify</label>
        <input type="text" id="pedido" placeholder="Ej: 1234" />
      </div>
    </div>
  </div>

  <!-- Datos del cliente -->
  <div class="section">
    <div class="section-title">Datos del Cliente</div>
    <div class="form-group">
      <label>Nombre completo</label>
      <input type="text" id="nombre" placeholder="Nombre del cliente" />
    </div>
    <div class="form-group">
      <label>Cédula</label>
      <input type="text" id="cedula" placeholder="Número de cédula" />
    </div>
    <div class="form-group">
      <label>Dirección</label>
      <input type="text" id="direccion" placeholder="Dirección de envío" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" id="telefono" placeholder="300 123 4567" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="cliente@email.com" />
      </div>
    </div>
  </div>

  <!-- Productos -->
  <div class="section">
    <div class="section-title">Productos</div>
    <div id="products-list"></div>
    <button class="btn btn-add" onclick="addProduct()">+ Agregar producto</button>
  </div>

  <!-- Envío y totales -->
  <div class="section">
    <div class="section-title">Envío y Totales</div>
    <div class="form-group">
      <label>Valor de envío (dejar en 0 si no aplica)</label>
      <input type="number" id="envio" value="0" min="0" step="100" oninput="updateTotals()" />
    </div>
    <div class="totals" id="totals-area">
      <div class="label">Subtotal</div>
      <div class="value" id="subtotal-display">$0</div>
      <div class="label">Envío</div>
      <div class="value" id="envio-display">$0</div>
      <div class="total-final"><div class="label">Total</div></div>
      <div class="total-final"><div class="value" id="total-display">$0</div></div>
    </div>
  </div>

  <!-- QR Code -->
  <div class="section">
    <div class="section-title">Código QR</div>
    <div class="form-group">
      <label>Enlace para el código QR</label>
      <input type="url" id="qr-url" placeholder="https://bocanajoyas.co/..." oninput="generateQR()" />
    </div>
    <div id="qr-preview"></div>
    <p class="qr-note">Este QR se insertará en la factura</p>
  </div>

  <button class="btn btn-generate" id="btn-gen" onclick="generateInvoice()">
    Generar Factura .docx
  </button>
  <div class="status-msg" id="status-msg"></div>
</div>

let productCount = 0;
let qrInstance = null;

function addProduct() {
  productCount++;
  const id = productCount;
  const div = document.createElement('div');
  div.className = 'product-item';
  div.id = `product-${id}`;
  div.innerHTML = `
    <button class="btn-remove" onclick="removeProduct(${id})">✕</button>
    <div class="form-group">
      <label>Producto</label>
      <input type="text" class="p-name" placeholder="Nombre del producto" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Cantidad</label>
        <input type="number" class="p-qty" value="1" min="1" oninput="updateTotals()" />
      </div>
      <div class="form-group">
        <label>Precio unidad ($)</label>
        <input type="number" class="p-price" value="0" min="0" step="100" oninput="updateTotals()" />
      </div>
    </div>
    <div class="product-subtotal" id="psub-${id}">Subtotal: $0</div>
  `;
  document.getElementById('products-list').appendChild(div);
  updateTotals();
}

function removeProduct(id) {
  const el = document.getElementById(`product-${id}`);
  if (el) el.remove();
  updateTotals();
}

function getProducts() {
  const items = document.querySelectorAll('.product-item');
  const products = [];
  items.forEach(item => {
    const name = item.querySelector('.p-name').value || 'Producto';
    const qty = parseInt(item.querySelector('.p-qty').value) || 1;
    const price = parseFloat(item.querySelector('.p-price').value) || 0;
    products.push({ name, qty, price, total: qty * price });
  });
  return products;
}

function formatCurrency(n) {
  return '$' + Math.round(n).toLocaleString('es-CO');
}

function updateTotals() {
  const products = getProducts();
  const items = document.querySelectorAll('.product-item');
  let idx = 0;
  items.forEach(item => {
    const p = products[idx];
    const subEl = item.querySelector('.product-subtotal');
    if (subEl && p) subEl.textContent = `Subtotal: ${formatCurrency(p.total)}`;
    idx++;
  });
  const subtotal = products.reduce((s, p) => s + p.total, 0);
  const envio = parseFloat(document.getElementById('envio').value) || 0;
  const total = subtotal + envio;
  document.getElementById('subtotal-display').textContent = formatCurrency(subtotal);
  document.getElementById('envio-display').textContent = formatCurrency(envio);
  document.getElementById('total-display').textContent = formatCurrency(total);
}

function generateQR() {
  const url = document.getElementById('qr-url').value.trim();
  const container = document.getElementById('qr-preview');
  container.innerHTML = '';
  if (!url) return;
  qrInstance = new QRCode(container, {
    text: url,
    width: 160,
    height: 160,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
}

function getQRImageAsBlob() {
  return new Promise((resolve) => {
    const container = document.getElementById('qr-preview');
    const canvas = container.querySelector('canvas');
    if (!canvas) { resolve(null); return; }
    // Draw with white background and add logo text
    const size = 400;
    const outCanvas = document.createElement('canvas');
    outCanvas.width = size;
    outCanvas.height = size;
    const ctx = outCanvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, size, size);
    ctx.drawImage(canvas, 0, 0, size, size);
    outCanvas.toBlob(blob => resolve(blob), 'image/png');
  });
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T12:00:00');
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return `${d.getDate()} de ${months[d.getMonth()]} de ${d.getFullYear()}`;
}

function escapeXml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');
}

function showStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.className = 'status-msg ' + type;
  el.textContent = msg;
  el.style.display = 'block';
}

// Build a product row XML matching the template format
function buildProductRowXml(name, qty, price, total) {
  const cellStart = (text, bold) => {
    const bTag = bold ? `<w:b w:val="1"/><w:bCs w:val="1"/>` : '';
    return `<w:tc>
          <w:tcPr>
            <w:shd w:fill="auto" w:val="clear"/>
            <w:tcMar>
              <w:top w:w="100.0" w:type="dxa"/>
              <w:left w:w="100.0" w:type="dxa"/>
              <w:bottom w:w="100.0" w:type="dxa"/>
              <w:right w:w="100.0" w:type="dxa"/>
            </w:tcMar>
            <w:vAlign w:val="top"/>
          </w:tcPr>
          <w:p>
            <w:pPr>
              <w:spacing w:after="0" w:before="0" w:line="240" w:lineRule="auto"/>
              <w:rPr>
                <w:rFonts w:ascii="Lexend" w:cs="Lexend" w:eastAsia="Lexend" w:hAnsi="Lexend"/>
                ${bTag}
                <w:sz w:val="18"/>
                <w:szCs w:val="18"/>
              </w:rPr>
            </w:pPr>
            <w:r>
              <w:rPr>
                <w:rFonts w:ascii="Lexend" w:cs="Lexend" w:eastAsia="Lexend" w:hAnsi="Lexend"/>
                ${bTag}
                <w:sz w:val="18"/>
                <w:szCs w:val="18"/>
              </w:rPr>
              <w:t xml:space="preserve">${escapeXml(text)}</w:t>
            </w:r>
          </w:p>
        </w:tc>`;
  };
  return `<w:tr>
        <w:trPr>
          <w:cantSplit w:val="0"/>
          <w:tblHeader w:val="0"/>
        </w:trPr>
        ${cellStart(name, false)}
        ${cellStart(String(qty), false)}
        ${cellStart(formatCurrency(price), false)}
        ${cellStart(formatCurrency(total), false)}
      </w:tr>`;
}

            <w:vAlign w:val="top"/>
          </w:tcPr>
          <w:p>
            <w:pPr>
              <w:spacing w:after="0" w:before="0" w:line="240" w:lineRule="auto"/>
              <w:rPr><w:rFonts w:ascii="Lexend" w:cs="Lexend" w:eastAsia="Lexend" w:hAnsi="Lexend"/><w:b w:val="1"/><w:bCs w:val="1"/><w:sz w:val="18"/><w:szCs w:val="18"/></w:rPr>

            <w:r><w:rPr><w:rFonts w:ascii="Lexend" w:cs="Lexend" w:eastAsia="Lexend" w:hAnsi="Lexend"/><w:b w:val="1"/><w:bCs w:val="1"/><w:sz w:val="18"/><w:szCs w:val="18"/></w:rPr><w:t xml:space="preserve">${escapeXml(totalVal)}</w:t></w:r>

      </w:tr>`;
}

async function generateInvoice() {
  const btn = document.getElementById('btn-gen');
  btn.disabled = true;
  btn.textContent = 'Generando...';

  try {
    // Gather form data
    const fecha = formatDate(document.getElementById('fecha').value);
    const pedido = document.getElementById('pedido').value.trim();
    const nombre = document.getElementById('nombre').value.trim();
    const cedula = document.getElementById('cedula').value.trim();
    const direccion = document.getElementById('direccion').value.trim();
    const telefono = document.getElementById('telefono').value.trim();
    const email = document.getElementById('email').value.trim();
    const envio = parseFloat(document.getElementById('envio').value) || 0;
    const products = getProducts();

    if (!nombre) { showStatus('Por favor ingresa el nombre del cliente', 'error'); return; }
    if (products.length === 0) { showStatus('Agrega al menos un producto', 'error'); return; }

    // Load template
    const templateBytes = Uint8Array.from(atob(TEMPLATE_B64), c => c.charCodeAt(0));
    const zip = await JSZip.loadAsync(templateBytes);

    // Get QR image
    const qrBlob = await getQRImageAsBlob();
    if (qrBlob) {
      zip.file('word/media/image2.png', qrBlob);
    }

    // Process header1.xml - replace placeholders
    let headerXml = await zip.file('word/header1.xml').async('string');
    headerXml = headerXml.replace('{fecha actual}', escapeXml(fecha || 'Sin fecha'));
    headerXml = headerXml.replace('{shopify pedido}', escapeXml(pedido || '0000'));
    zip.file('word/header1.xml', headerXml);

    // Process document.xml
    let docXml = await zip.file('word/document.xml').async('string');

    // Replace simple text placeholders
    docXml = docXml.replace('{Nombre Cliente}', escapeXml(nombre));
    docXml = docXml.replace('{cedula}', escapeXml(cedula));
    docXml = docXml.replace('{Direccion}', escapeXml(direccion));
    docXml = docXml.replace('{telefono}', escapeXml(telefono));
    docXml = docXml.replace('{email}', escapeXml(email));

    // Now handle the product table (Table3)
    // Strategy: find the product table, keep header row, replace data+envio+total rows
    // The product table has tblStyle Table3 and columns: 3900, 1320, 1980, 1740
    const tableStartMarker = '<w:tblStyle w:val="Table3"/>';
    const tableStartIdx = docXml.indexOf(tableStartMarker);

    if (tableStartIdx !== -1) {
      // Find the <w:tbl> that contains this
      const tblOpenBefore = docXml.lastIndexOf('<w:tbl>', tableStartIdx);
      const tblCloseAfter = docXml.indexOf('</w:tbl>', tableStartIdx);

      if (tblOpenBefore !== -1 && tblCloseAfter !== -1) {
        const tableXml = docXml.substring(tblOpenBefore, tblCloseAfter + '</w:tbl>'.length);

        // Find the header row end (first </w:tr> after first <w:tr>)
        const firstTrOpen = tableXml.indexOf('<w:tr>');
        // Skip to the tblGrid end first
        const tblGridEnd = tableXml.indexOf('</w:tblGrid>');
        const headerTrStart = tableXml.indexOf('<w:tr>', tblGridEnd);
        const headerTrEnd = tableXml.indexOf('</w:tr>', headerTrStart) + '</w:tr>'.length;

        const tablePrefix = tableXml.substring(0, headerTrEnd);

        // Build product rows
        const subtotal = products.reduce((s, p) => s + p.total, 0);
        const total = subtotal + envio;

        let productRows = '';
        for (const p of products) {
          productRows += buildProductRowXml(p.name, p.qty, p.price, p.total);
        }
        // Add envio row
        productRows += buildEnvioRowXml(envio > 0 ? formatCurrency(envio) : '$0');
        // Add total row
        productRows += buildTotalRowXml(formatCurrency(total));

        const newTable = tablePrefix + productRows + '</w:tbl>';
        docXml = docXml.substring(0, tblOpenBefore) + newTable + docXml.substring(tblCloseAfter + '</w:tbl>'.length);
      }
    }

    zip.file('word/document.xml', docXml);

    // Generate output
    const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Factura_${pedido || 'Bocana'}_${nombre.replace(/\s+/g, '_') || 'Cliente'}.docx`;
    a.click();
    URL.revokeObjectURL(url);
    showStatus('¡Factura generada exitosamente!', 'success');

  } catch (err) {
    console.error(err);
    showStatus('Error al generar: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generar Factura .docx';
  }
}
